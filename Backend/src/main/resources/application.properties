spring.application.name=hotelrm-backend
spring.profiles.default=${SPRING_PROFILES_DEFAULT:local}

server.port=${SERVER_PORT:8091}
spring.cloud.config.enabled=false
eureka.client.enabled=false

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:hotelrm}
spring.datasource.username=${DB_USER:hotelrm_app}
spring.datasource.password=${DB_PASSWORD:changeit}

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.security.enabled=${APP_SECURITY_ENABLED:true}
app.security.admin-role=${KEYCLOAK_ADMIN_ROLE:hotelrm_admin}
app.security.keycloak.realm=${KEYCLOAK_REALM:hotelrm}
app.security.keycloak.auth-server-url=${KEYCLOAK_AUTH_SERVER_URL:http://localhost:8080}
app.security.keycloak.client-id=${KEYCLOAK_CLIENT_ID:hotelrm-frontend}
app.security.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,http://localhost:4173}

spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:${app.security.keycloak.auth-server-url}/realms/${app.security.keycloak.realm}}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
