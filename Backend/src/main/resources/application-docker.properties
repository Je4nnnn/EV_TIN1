spring.datasource.url=jdbc:postgresql://${DB_HOST:host.docker.internal}:${DB_PORT:5432}/${DB_NAME:hotelrm}
app.security.enabled=${APP_SECURITY_ENABLED:true}
app.security.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:http://host.docker.internal:8080/realms/${KEYCLOAK_REALM:hotelrm}}
