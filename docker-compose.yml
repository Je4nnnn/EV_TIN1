services:
  backend:
    build:
      context: ./Backend
    container_name: hotelrm-backend
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8091
      DB_HOST: ${DB_HOST_DOCKER:-host.docker.internal}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-hotelrm}
      DB_USER: ${DB_USER:-hotelrm_app}
      DB_PASSWORD: ${DB_PASSWORD:-changeit}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-hotelrm}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-hotelrm-frontend}
      KEYCLOAK_ADMIN_ROLE: ${KEYCLOAK_ADMIN_ROLE:-hotelrm_admin}
      KEYCLOAK_ISSUER_URI: ${KEYCLOAK_ISSUER_URI_DOCKER:-http://host.docker.internal:8080/realms/${KEYCLOAK_REALM:-hotelrm}}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS_DOCKER:-http://localhost:3000,http://localhost:5173,http://localhost:4173}
    extra_hosts:
      - host.docker.internal:host-gateway
    ports:
      - "8091:8091"

  frontend:
    build:
      context: ./Frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL_DOCKER:-http://localhost:8091}
        VITE_PAYROLL_BACKEND_SERVER: ${VITE_PAYROLL_BACKEND_SERVER_DOCKER:-http://localhost:8091}
        VITE_KEYCLOAK_ENABLED: ${VITE_KEYCLOAK_ENABLED:-true}
        VITE_KEYCLOAK_URL: ${VITE_KEYCLOAK_URL_DOCKER:-http://localhost:8080}
        VITE_KEYCLOAK_REALM: ${VITE_KEYCLOAK_REALM:-hotelrm}
        VITE_KEYCLOAK_CLIENT_ID: ${VITE_KEYCLOAK_CLIENT_ID:-hotelrm-frontend}
        VITE_KEYCLOAK_ADMIN_ROLE: ${VITE_KEYCLOAK_ADMIN_ROLE:-hotelrm_admin}
    container_name: hotelrm-frontend
    depends_on:
      - backend
    ports:
      - "3000:3000"
